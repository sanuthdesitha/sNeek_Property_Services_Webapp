services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    command: >
      sh -lc "npx prisma migrate deploy &&
      npm run admin:bootstrap &&
      npm run start"
    environment:
      NODE_ENV: production
      NEXT_DIST_DIR: .next-prod
      APP_URL: ${APP_URL}
      APP_BASE_URL: ${APP_BASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      TZ: ${TZ:-Australia/Sydney}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/sneek_ops?schema=public
      DIRECT_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/sneek_ops?schema=public
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_REGION: ${S3_REGION}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
      VIDEO_MAX_UPLOAD_MB: ${VIDEO_MAX_UPLOAD_MB:-300}

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -lc "npx prisma generate &&
      npx tsx workers/boss.ts"
    environment:
      NODE_ENV: production
      NEXT_DIST_DIR: .next-prod
      APP_URL: ${APP_URL}
      APP_BASE_URL: ${APP_BASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      TZ: ${TZ:-Australia/Sydney}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/sneek_ops?schema=public
      DIRECT_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/sneek_ops?schema=public
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_REGION: ${S3_REGION}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sneek_ops
      TZ: ${TZ:-Australia/Sydney}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sneek_ops"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
